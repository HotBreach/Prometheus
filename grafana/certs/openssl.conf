[ req ]
default_bits       = 4096
default_keyfile    = private.key
distinguished_name = req_distinguished_name
req_extensions     = req_ext
prompt            = no

[ req_distinguished_name ]
C  = RU
ST = Yekaterinburg
L  = Yekaterinburg
O  = Company
OU = IT Department
CN = service.domain.example

[ req_ext ]
subjectAltName = @alt_names

[ alt_names ]
DNS.1 = example
DNS.2 = domain.example
DNS.3 = service.domain.example