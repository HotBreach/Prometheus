# grafana/ldap.toml
[[servers]]
# Адрес контроллера AD (можно указать несколько, разделив запятыми)
host = "dc.domain.example"
port = 389                # 636 – если используешь LDAPS
use_ssl = false           # true, если LDAPS
start_tls = false
ssl_skip_verify = false   # true только для самоподписанных сертификатов

# Сервисный аккаунт, имеющий право искать в каталоге
bind_dn = "LdapR"
bind_password = ""

# База поиска (корень дерева)
search_base_dns = ["OU=Users,DC=example,DC=com"]

# Фильтр пользователей – %s будет заменён именем входа
search_filter = "(sAMAccountName=%s)"

# Атрибуты, которые Grafana будет использовать
[servers.attributes]
name       = "givenName"
surname    = "sn"
username   = "sAMAccountName"
member_of  = "memberOf"
email      = "mail"

# Сопоставление групп AD ролям Grafana
[[servers.group_mappings]]
group_dn = "CN=GrafanaAdmins,OU=Groups,DC=example,DC=com"
org_role = "Admin"

[[servers.group_mappings]]
group_dn = "CN=GrafanaEditors,OU=Groups,DC=example,DC=com"
org_role = "Editor"

# По умолчанию все остальные пользователи получают Viewer
[[servers.group_mappings]]
group_dn = "*"
org_role = "Viewer"